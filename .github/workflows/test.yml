name: run

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    name: unit-tests
    strategy:
      matrix:
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Start node in background
      uses: dutterbutter/era-test-node-action@main
      with:
        mode: 'run'

    - name: Debugging (list all processes)
      run: |
        ps aux
      
    - name: Debugging (check network ports)
      run: |
        netstat -tuln

    - name: Install Dependencies
      run: yarn install
    
    - name: Run Tests
      run: |
        yarn test:contracts

    - name: Shutdown Node
      run: |
        pkill -f era_test_node || true
