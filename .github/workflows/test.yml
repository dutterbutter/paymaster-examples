name: run

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    name: unit-tests
    strategy:
      matrix:
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Start node
      id: run_era_test_node
      uses: dutterbutter/era-test-node-action@main
      with:
        mode: 'run'

    - name: Debugging (list all processes)
      run: |
        ps aux
      
    - name: Debugging (check network ports)
      run: |
        netstat -tuln

    - name: Check if Node service is running
      run: |
        curl -X POST --data '{"jsonrpc":"2.0","method":"net_version","params":[],"id":1}' -H "Content-Type: application/json" http://localhost:8011

    - name: Install Dependencies
      run: yarn install
    
    - name: Run Tests
      run: |
        yarn test:contracts

    - name: Shutdown Node
      run: |
        pkill -f era_test_node || true
