name: run

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    name: unit-tests
    strategy:
      matrix:
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Start Node
      uses: dutterbutter/era-test-node-action@v0.0.1
      with:
        mode: 'run'
    
    - name: Ensure node is up
      run: sleep 10

    - name: Install Dependencies
      run: yarn install
    
    - name: Run Tests
      run: |
        yarn test:contracts

    - name: Shutdown Node
      run: |
        pkill -f era_test_node || true
